{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sameer.dev — Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">


</head>

<body>

  <script>
    // Apply theme immediately to prevent flash of incorrect theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <div class="animated-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="grid-bg"></div>

  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- ── NAVBAR ── -->
  <nav class="site-nav" id="site-nav">
    <a href="/" class="nav-brand" style="display: flex; align-items: center; gap: 8px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="34" viewBox="0 0 66 40" fill="none" style="flex-shrink: 0;">
        <defs>
          <linearGradient id="sm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--accent)" />
            <stop offset="50%" stop-color="var(--accent3)" />
            <stop offset="100%" stop-color="var(--accent2)" />
          </linearGradient>
          <filter id="sm-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
        </defs>
        <path d="M 28 10 L 12 10 L 12 20 L 28 20 L 28 30 L 12 30 M 34 30 L 34 10 L 44 20 L 54 10 L 54 30" stroke="url(#sm-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#sm-glow)"/>
      </svg>
    </a>

    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="nav-links">
      <li><a href="/" class="{% block nav_home %}{% endblock %}">Home</a></li>
      <li><a href="/about/" class="{% block nav_about %}{% endblock %}">About</a></li>
      <li><a href="/projects/" class="{% block nav_projects %}{% endblock %}">Projects</a></li>
      <li><a href="/contact/" class="{% block nav_contact %}{% endblock %}">Contact</a></li>
      <li>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
          <i class="ri-moon-line" id="theme-icon"></i>
        </button>
      </li>
    </ul>
  </nav>

  <!-- ── CONTENT ── -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div>Built with <span>Django</span> &amp; <span>❤</span> — Sameer Malek</div>
    <div>
      <a href="mailto:maleksameer654@gmail.com">Email</a> &nbsp;·&nbsp;
      <a href="https://github.com/sameermalek9090" target="_blank">GitHub</a> &nbsp;·&nbsp;
      <a href="https://www.linkedin.com/in/sameer-malek-65a0b7401/" target="_blank">LinkedIn</a>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      © 2026
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        style="color: var(--accent);">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      Sameer<span>.dev</span>
    </div>
  </footer>

  <!-- ── MESSAGES ── -->
  {% if messages %}
  <div class="messages-wrap">
    {% for message in messages %}
    <div class="msg-toast {{ message.tags }}" id="msg-{{ forloop.counter }}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  <script>
    document.querySelectorAll('.msg-toast').forEach(el => {
      setTimeout(() => el.style.opacity = '0', 3500);
      setTimeout(() => el.remove(), 4000);
    });
  </script>
  {% endif %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleNav() {
      document.getElementById('nav-links').classList.toggle('open');
    }
    // Close on outside click
    document.addEventListener('click', e => {
      const nav = document.getElementById('site-nav');
      if (!nav.contains(e.target)) {
        document.getElementById('nav-links').classList.remove('open');
      }
    });

    // Theme Toggle Logic
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const target = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', target);
      localStorage.setItem('theme', target);
      updateThemeIcon(target);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('theme-icon');
      if (theme === 'light') {
        icon.classList.remove('ri-moon-line');
        icon.classList.add('ri-sun-line');
      } else {
        icon.classList.remove('ri-sun-line');
        icon.classList.add('ri-moon-line');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');
    });

    // Advanced Custom Cursor Logic
    const cursorDot = document.getElementById('cursor-dot');
    const cursorRing = document.getElementById('cursor-ring');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let ringX = window.innerWidth / 2;
    let ringY = window.innerHeight / 2;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
    });

    document.addEventListener('mousedown', () => {
      cursorDot.classList.add('click');
      cursorRing.classList.add('click');
    });
    document.addEventListener('mouseup', () => {
      cursorDot.classList.remove('click');
      cursorRing.classList.remove('click');
    });

    function animateCursor() {
      // Linear Interpolation for smooth floating effect
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;

      cursorRing.style.left = ringX + 'px';
      cursorRing.style.top = ringY + 'px';

      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Add magnetic hover effect to interactive elements
    const interactiveElements = document.querySelectorAll('a, button, input, textarea, .skill-card, .project-card');
    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => cursorRing.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursorRing.classList.remove('hover'));
    });
  </script>

</body>

</html>
