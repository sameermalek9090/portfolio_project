{% extends "base.html" %}

{% block content %}




<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-icon">🔐</div>
    <h3 class="auth-title">Secure Login</h3>
    <p class="auth-subtitle">Enter your email to receive a One-Time Password.</p>

    <form method="POST">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="admin@example.com" required>
      </div>

      <button type="submit" class="btn-submit">
        Send OTP Password →
      </button>
    </form>
  </div>
</div>
{% endblock %}
